<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Fast delivery">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fdf2e3"/>
      <stop offset="0.55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f39c12"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#1e293b" stop-opacity="0.60"/>
      <stop offset="1" stop-color="#1e293b" stop-opacity="0.10"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect width="1200" height="700" fill="url(#fade)"/>

  <!-- Speed lines -->
  <g stroke="#ffffff" stroke-opacity="0.26" stroke-width="10" stroke-linecap="round">
    <path d="M80 220H520"/>
    <path d="M80 270H420"/>
    <path d="M80 320H560"/>
    <path d="M80 370H480"/>
  </g>

  <!-- Truck silhouette -->
  <g transform="translate(360 320)" opacity="0.86">
    <rect x="0" y="40" width="420" height="130" rx="22" fill="#ffffff" opacity="0.28"/>
    <rect x="420" y="70" width="200" height="100" rx="22" fill="#ffffff" opacity="0.30"/>
    <rect x="456" y="92" width="86" height="40" rx="10" fill="#ffffff" opacity="0.35"/>

    <g fill="#f39c12" opacity="0.55">
      <rect x="38" y="72" width="78" height="56" rx="12"/>
      <rect x="130" y="72" width="78" height="56" rx="12"/>
      <rect x="222" y="72" width="78" height="56" rx="12"/>
      <rect x="314" y="72" width="78" height="56" rx="12"/>
    </g>

    <g fill="#1e293b" opacity="0.32">
      <circle cx="150" cy="188" r="28"/>
      <circle cx="340" cy="188" r="28"/>
      <circle cx="510" cy="188" r="28"/>
    </g>
    <g fill="#ffffff" opacity="0.62">
      <circle cx="150" cy="188" r="12"/>
      <circle cx="340" cy="188" r="12"/>
      <circle cx="510" cy="188" r="12"/>
    </g>
  </g>

  <!-- Accent arrow -->
  <path d="M1010 170h90l-34-34 18-18 66 66-66 66-18-18 34-34h-90z" fill="#ffffff" opacity="0.16"/>
</svg>
