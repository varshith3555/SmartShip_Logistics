<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Global shipping coverage">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.45" stop-color="#f8f9fa"/>
      <stop offset="1" stop-color="#d68910"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#1e293b" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#1e293b" stop-opacity="0.10"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect width="1200" height="700" fill="url(#fade)"/>

  <!-- Globe -->
  <g transform="translate(330 120)" opacity="0.92">
    <circle cx="270" cy="250" r="200" fill="#ffffff" opacity="0.14"/>
    <circle cx="270" cy="250" r="160" fill="#f39c12" opacity="0.12"/>

    <g fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="10">
      <circle cx="270" cy="250" r="200"/>
      <path d="M70 250H470"/>
      <path d="M270 50V450"/>
      <path d="M120 160C200 210 340 210 420 160"/>
      <path d="M120 340C200 290 340 290 420 340"/>
      <path d="M200 70C240 150 240 350 200 430"/>
      <path d="M340 70C300 150 300 350 340 430"/>
    </g>

    <!-- Connection arcs -->
    <g fill="none" stroke="#f39c12" stroke-opacity="0.35" stroke-width="8" stroke-linecap="round">
      <path d="M130 140C210 90 330 90 410 140"/>
      <path d="M150 360C250 420 290 420 390 360"/>
      <path d="M100 240C140 210 160 200 200 190"/>
    </g>

    <g fill="#ffffff" opacity="0.25">
      <circle cx="180" cy="180" r="8"/>
      <circle cx="360" cy="180" r="8"/>
      <circle cx="240" cy="350" r="8"/>
      <circle cx="360" cy="320" r="8"/>
    </g>
  </g>
</svg>
