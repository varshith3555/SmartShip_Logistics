<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="24/7 customer support">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#f8f9fa"/>
      <stop offset="1" stop-color="#f39c12"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#1e293b" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#1e293b" stop-opacity="0.10"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect width="1200" height="700" fill="url(#fade)"/>

  <!-- Chat bubbles -->
  <g transform="translate(170 170)" opacity="0.94">
    <rect x="0" y="0" width="560" height="220" rx="28" fill="#ffffff" opacity="0.16"/>
    <path d="M120 220 170 220 130 270Z" fill="#ffffff" opacity="0.16"/>
    <rect x="56" y="62" width="340" height="16" rx="8" fill="#ffffff" opacity="0.26"/>
    <rect x="56" y="96" width="440" height="12" rx="6" fill="#ffffff" opacity="0.20"/>
    <rect x="56" y="120" width="410" height="12" rx="6" fill="#ffffff" opacity="0.20"/>
    <rect x="56" y="150" width="210" height="40" rx="16" fill="#f39c12" opacity="0.18"/>
  </g>

  <g transform="translate(470 360)" opacity="0.92">
    <rect x="0" y="0" width="560" height="220" rx="28" fill="#ffffff" opacity="0.14"/>
    <path d="M440 220 490 220 520 270Z" fill="#ffffff" opacity="0.14"/>
    <rect x="56" y="62" width="300" height="16" rx="8" fill="#ffffff" opacity="0.22"/>
    <rect x="56" y="96" width="440" height="12" rx="6" fill="#ffffff" opacity="0.18"/>
    <rect x="56" y="120" width="380" height="12" rx="6" fill="#ffffff" opacity="0.18"/>
    <rect x="56" y="150" width="250" height="40" rx="16" fill="#f39c12" opacity="0.18"/>
  </g>

  <!-- 24/7 ring -->
  <g transform="translate(900 140)" opacity="0.9">
    <circle cx="120" cy="120" r="86" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="14"/>
    <circle cx="120" cy="120" r="86" fill="none" stroke="#f39c12" stroke-opacity="0.35" stroke-width="14" stroke-dasharray="120 32" stroke-linecap="round"/>
    <text x="120" y="132" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#ffffff" fill-opacity="0.55">24/7</text>
  </g>
</svg>
