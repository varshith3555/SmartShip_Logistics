<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="600" viewBox="0 0 1600 600" role="img" aria-label="Logistics hero background">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="0.55" stop-color="#2b3b54"/>
      <stop offset="1" stop-color="#f39c12"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1600" height="600" fill="url(#bg)"/>
  <rect x="0" y="0" width="1600" height="320" fill="url(#glow)"/>

  <!-- Subtle clouds -->
  <g fill="#ffffff" opacity="0.12">
    <ellipse cx="260" cy="130" rx="110" ry="36"/>
    <ellipse cx="350" cy="125" rx="80" ry="28"/>
    <ellipse cx="980" cy="110" rx="130" ry="40"/>
    <ellipse cx="1090" cy="115" rx="95" ry="32"/>
    <ellipse cx="1280" cy="165" rx="120" ry="38"/>
    <ellipse cx="1380" cy="160" rx="85" ry="30"/>
  </g>

  <!-- Plane silhouette -->
  <g fill="#ffffff" opacity="0.16" transform="translate(860 120) scale(1.05)">
    <path d="M180 38c-20 0-36 12-44 28L18 98c-8 2-14 8-14 14 0 8 6 14 14 14l110 0 14 20-40 18c-6 3-10 8-10 14 0 10 10 16 20 12l56-20 26 36c4 6 12 10 20 10s16-4 20-10l26-36 56 20c10 4 20-2 20-12 0-6-4-11-10-14l-40-18 14-20 110 0c8 0 14-6 14-14 0-6-6-12-14-14L224 66c-8-16-24-28-44-28Zm0 26c10 0 18 8 18 18s-8 18-18 18-18-8-18-18 8-18 18-18Z"/>
  </g>

  <!-- Ship + containers -->
  <g transform="translate(980 340)">
    <g opacity="0.30" fill="#ffffff">
      <rect x="60" y="0" width="70" height="40" rx="4"/>
      <rect x="140" y="0" width="70" height="40" rx="4"/>
      <rect x="220" y="0" width="70" height="40" rx="4"/>
      <rect x="100" y="-48" width="70" height="40" rx="4"/>
      <rect x="180" y="-48" width="70" height="40" rx="4"/>
    </g>
    <path d="M0 70h520l-32 56c-8 14-24 22-40 22H110c-18 0-34-8-42-22L0 70Z" fill="#ffffff" opacity="0.22"/>
    <rect x="0" y="70" width="520" height="10" fill="#ffffff" opacity="0.18"/>
    <path d="M360 10h18v60h-18z" fill="#ffffff" opacity="0.22"/>
    <path d="M378 10h34l12 20h-46z" fill="#ffffff" opacity="0.18"/>
  </g>

  <!-- Truck + container -->
  <g transform="translate(140 360)">
    <rect x="0" y="40" width="520" height="120" rx="14" fill="#ffffff" opacity="0.18"/>
    <rect x="520" y="70" width="190" height="90" rx="14" fill="#ffffff" opacity="0.20"/>
    <rect x="550" y="88" width="72" height="34" rx="6" fill="#ffffff" opacity="0.18"/>

    <g fill="#ffffff" opacity="0.20">
      <circle cx="140" cy="172" r="28"/>
      <circle cx="420" cy="172" r="28"/>
      <circle cx="590" cy="172" r="28"/>
    </g>
    <g fill="#1e293b" opacity="0.32">
      <circle cx="140" cy="172" r="14"/>
      <circle cx="420" cy="172" r="14"/>
      <circle cx="590" cy="172" r="14"/>
    </g>

    <g stroke="#ffffff" opacity="0.18" stroke-width="6">
      <line x1="60" y1="70" x2="480" y2="70"/>
      <line x1="60" y1="100" x2="480" y2="100"/>
      <line x1="60" y1="130" x2="480" y2="130"/>
    </g>
  </g>

  <!-- Foreground accent bars -->
  <g opacity="0.12" fill="#ffffff">
    <rect x="0" y="552" width="1600" height="8"/>
    <rect x="0" y="570" width="1600" height="6"/>
  </g>
</svg>
