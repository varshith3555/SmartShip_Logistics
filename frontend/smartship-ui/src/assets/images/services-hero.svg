<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="500" viewBox="0 0 1600 500" role="img" aria-label="Services hero background">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="0.6" stop-color="#2a3a53"/>
      <stop offset="1" stop-color="#d68910"/>
    </linearGradient>
    <radialGradient id="spot" cx="25%" cy="25%" r="65%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1600" height="500" fill="url(#bg)"/>
  <rect x="0" y="0" width="1600" height="500" fill="url(#spot)"/>

  <!-- Subtle grid -->
