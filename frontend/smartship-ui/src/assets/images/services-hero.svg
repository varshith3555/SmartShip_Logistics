    <path d="M0 80H1600"/>
    <path d="M0 160H1600"/>
    <path d="M0 240H1600"/>
    <path d="M0 320H1600"/>
    <path d="M0 400H1600"/>

    <path d="M120 0V500"/>
    <path d="M320 0V500"/>
    <path d="M520 0V500"/>
    <path d="M720 0V500"/>
    <path d="M920 0V500"/>
    <path d="M1120 0V500"/>
    <path d="M1320 0V500"/>
    <path d="M1520 0V500"/>
  </g>

  <!-- Minimal logistics marks -->
  <g opacity="0.18" fill="#ffffff">
    <circle cx="260" cy="120" r="6"/>
    <circle cx="320" cy="200" r="5"/>
    <circle cx="420" cy="150" r="4"/>
    <circle cx="520" cy="260" r="6"/>
    <circle cx="680" cy="110" r="5"/>
    <circle cx="780" cy="220" r="4"/>
    <circle cx="980" cy="140" r="6"/>
    <circle cx="1110" cy="230" r="5"/>
    <circle cx="1240" cy="160" r="4"/>
    <circle cx="1380" cy="260" r="6"/>
  </g>

  <!-- Abstract route line -->
  <path d="M140 360 C 320 280, 500 420, 680 340 S 1040 300, 1240 360 S 1440 420, 1560 320" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="6"/>
  <path d="M140 360 C 320 280, 500 420, 680 340 S 1040 300, 1240 360 S 1440 420, 1560 320" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="14"/>
