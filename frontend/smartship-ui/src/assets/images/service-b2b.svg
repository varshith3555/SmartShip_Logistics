<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620" role="img" aria-label="B2B logistics illustration">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8f9fa"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="900" height="620" rx="28" fill="url(#g)"/>

  <!-- Warehouse -->
  <g transform="translate(120 120)">
    <rect x="0" y="120" width="520" height="260" rx="20" fill="#1e293b" opacity="0.08"/>
    <path d="M0 140 L260 0 L520 140 Z" fill="#1e293b" opacity="0.10"/>

    <g fill="#ffffff" opacity="0.75">
      <rect x="60" y="220" width="120" height="110" rx="12"/>
      <rect x="210" y="220" width="120" height="110" rx="12"/>
      <rect x="360" y="220" width="120" height="110" rx="12"/>
    </g>

    <g fill="#f39c12" opacity="0.80">
      <rect x="82" y="244" width="76" height="18" rx="6"/>
      <rect x="232" y="244" width="76" height="18" rx="6"/>
      <rect x="382" y="244" width="76" height="18" rx="6"/>
    </g>
  </g>

  <!-- Pallets / bulk boxes -->
  <g transform="translate(110 430)">
    <rect x="0" y="60" width="640" height="22" rx="10" fill="#1e293b" opacity="0.07"/>

    <g transform="translate(40 0)">
      <rect x="0" y="0" width="150" height="110" rx="16" fill="#f39c12" opacity="0.16"/>
      <rect x="170" y="0" width="150" height="110" rx="16" fill="#f39c12" opacity="0.16"/>
      <rect x="340" y="0" width="150" height="110" rx="16" fill="#f39c12" opacity="0.16"/>
      <rect x="510" y="0" width="150" height="110" rx="16" fill="#f39c12" opacity="0.16"/>

      <g fill="#1e293b" opacity="0.18">
        <rect x="18" y="18" width="114" height="14" rx="6"/>
        <rect x="188" y="18" width="114" height="14" rx="6"/>
        <rect x="358" y="18" width="114" height="14" rx="6"/>
        <rect x="528" y="18" width="114" height="14" rx="6"/>
      </g>
    </g>
  </g>
</svg>
