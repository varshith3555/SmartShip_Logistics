<div class="auth-container">
  <div class="auth-wrapper">
    <div class="auth-brand">
      <div class="brand-icon">
        <mat-icon>lock_reset</mat-icon>
      </div>
      <h1 class="brand-title">Forgot Password</h1>
      <p class="brand-subtitle">We’ll email you an OTP to reset your password</p>
    </div>

    <mat-card class="auth-card">
      <mat-card-content>
        <h2 class="auth-title">Reset via OTP</h2>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Email Address</mat-label>
            <mat-icon matPrefix class="input-icon">email</mat-icon>
            <input matInput formControlName="email" type="email" placeholder="you@example.com">
            <mat-error *ngIf="form.get('email')?.hasError('required')">Email is required</mat-error>
            <mat-error *ngIf="form.get('email')?.hasError('email')">Please enter a valid email</mat-error>
          </mat-form-field>

          <button
            mat-raised-button
            type="submit"
            class="submit-button"
            [disabled]="form.invalid || isSubmitting">
            <span>{{ isSubmitting ? 'Sending…' : 'Send OTP' }}</span>
            <mat-icon>arrow_forward</mat-icon>
          </button>
        </form>

        <div class="auth-links">
          <p class="link-text">
            <a routerLink="/auth/login" class="link">Back to Login</a>
          </p>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
