<nav class="landing-navbar">
  <div class="navbar-container">
    <div class="navbar-brand" routerLink="/">
      <img src="assets/images/smartship-logo.png" alt="SmartShip" class="nav-logo">
    </div>

    <div class="navbar-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">Home</a>
      <a routerLink="/about" routerLinkActive="active" class="nav-link">About Us</a>
      <a routerLink="/services" routerLinkActive="active" class="nav-link">Services</a>
      <a routerLink="/contact" routerLinkActive="active" class="nav-link">Contact</a>
      
      <div class="navbar-actions">
        <ng-container *ngIf="!isLoggedIn">
          <a routerLink="/auth/login" class="nav-link-btn login-btn">Login</a>
          <a routerLink="/auth/signup" class="nav-link-btn signup-btn">Sign Up</a>
        </ng-container>

        <ng-container *ngIf="isLoggedIn">
          <button mat-button [matMenuTriggerFor]="profileMenu" class="profile-btn">
            <mat-icon>account_circle</mat-icon>
            <span>{{ userName }}</span>
            <mat-icon>arrow_drop_down</mat-icon>
          </button>
          <mat-menu #profileMenu="matMenu">
            <button mat-menu-item (click)="navigateToDashboard()">
              <mat-icon>dashboard</mat-icon>
              <span>Dashboard</span>
            </button>
            <mat-divider></mat-divider>
            <button mat-menu-item (click)="logout()">
              <mat-icon>logout</mat-icon>
              <span>Logout</span>
            </button>
          </mat-menu>
        </ng-container>
      </div>
    </div>
  </div>
</nav>
