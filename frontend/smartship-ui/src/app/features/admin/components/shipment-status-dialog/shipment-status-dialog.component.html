    <h2 mat-dialog-title>Update status</h2>
    <form mat-dialog-content [formGroup]="form" (ngSubmit)="save()">
      <p class="hint">Shipment <span class="mono">{{ data.shipmentId }}</span></p>
      <mat-form-field appearance="outline" class="full">
        <mat-label>Status</mat-label>
        <mat-select formControlName="status">
          <mat-option *ngFor="let s of statuses" [value]="s.value" [disabled]="s.value === 'CREATED' || s.value === 'DRAFT'">{{ s.label }}</mat-option>
        </mat-select>
      </mat-form-field>

      <div *ngIf="requiresHub" class="hub">
        <mat-form-field appearance="outline" class="full">
          <mat-label>Current hub</mat-label>
          <mat-select formControlName="hubId">
            <mat-option *ngFor="let h of hubs" [value]="h.hubId">{{ h.hubName }}</mat-option>
          </mat-select>
          <mat-error *ngIf="form.controls.hubId.hasError('required')">Hub is required</mat-error>
        </mat-form-field>

        <div class="hub-meta" *ngIf="selectedHub?.location as loc">
          <div class="hub-meta-line">{{ loc.city }}, {{ loc.state }}</div>
          <div class="hub-meta-sub">{{ loc.country }} • {{ loc.pincode }}</div>
        </div>
      </div>

      <div *ngIf="isDelayed" class="delay">
        <mat-form-field appearance="outline" class="full">
          <mat-label>Delayed by (hours)</mat-label>
          <input matInput type="number" formControlName="delayedByHours" min="1" step="1" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="full">
          <mat-label>Reason</mat-label>
          <input matInput type="text" formControlName="reason" />
        </mat-form-field>
      </div>
    </form>
    <div mat-dialog-actions align="end">
      <button mat-button type="button" (click)="ref.close()">Cancel</button>
      <button
        mat-flat-button
        color="primary"
        type="button"
        (click)="save()"
        [disabled]="form.invalid || saving || isUnchanged"
      >
        {{ saving ? 'Saving…' : 'Save' }}
      </button>
    </div>
