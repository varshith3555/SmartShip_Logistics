version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: smartship_sql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    networks:
      - smartship_net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: smartship_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - smartship_net

  smartship_gateway:
    build:
      context: .
      dockerfile: gateway/SmartShip.Gateway/Dockerfile
    container_name: smartship_gateway
    ports:
      - "5000:8080"
    depends_on:
      - smartship_identity
      - smartship_shipment
      - smartship_tracking
      - smartship_document
      - smartship_admin
    networks:
      - smartship_net

  smartship_identity:
    build:
      context: .
      dockerfile: services/SmartShip.IdentityService/Dockerfile
    container_name: smartship_identity
    depends_on:
      - sqlserver
    networks:
      - smartship_net

  smartship_shipment:
    build:
      context: .
      dockerfile: services/SmartShip.ShipmentService/Dockerfile
    container_name: smartship_shipment
    depends_on:
      - sqlserver
      - rabbitmq
    networks:
      - smartship_net

  smartship_tracking:
    build:
      context: .
      dockerfile: services/SmartShip.TrackingService/Dockerfile
    container_name: smartship_tracking
    depends_on:
      - sqlserver
      - rabbitmq
    networks:
      - smartship_net

  smartship_document:
    build:
      context: .
      dockerfile: services/SmartShip.DocumentService/Dockerfile
    container_name: smartship_document
    depends_on:
      - sqlserver
    networks:
      - smartship_net

  smartship_admin:
    build:
      context: .
      dockerfile: services/SmartShip.AdminService/Dockerfile
    container_name: smartship_admin
    depends_on:
      - sqlserver
      - rabbitmq
    networks:
      - smartship_net

networks:
  smartship_net:
    driver: bridge

volumes:
  sql_data:
